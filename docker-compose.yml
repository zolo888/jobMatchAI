version: '3.9'

services:
  # ── Ollama LLM-server ──────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: jobmatch_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    # Kommentera in för GPU-stöd (NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobmatch_backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      - JOBSEARCH_API_URL=https://jobsearch.api.jobtechdev.se
      - MAX_JOBS_TO_RANK=20
    depends_on:
      - ollama
    restart: unless-stopped

  # ── Frontend (Vite dev) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobmatch_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_models:
    name: jobmatch_ollama_models
